<script>
  // ==========================================
  // 2. LÓGICA DE NOTIFICACIONES PUSH (DEBUG MODE)
  // ==========================================
  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) { outputArray[i] = rawData.charCodeAt(i); }
    return outputArray;
  }

  document.addEventListener('DOMContentLoaded', () => {
    console.log("PASO 1: Script iniciado. Verificando compatibilidad...");
    
    if ('serviceWorker' in navigator && 'PushManager' in window) {
      console.log("PASO 2: El navegador soporta Service Workers.");
      console.log("ESTADO DEL PERMISO ACTUAL:", Notification.permission);

      Notification.requestPermission().then(permission => {
        console.log("PASO 3: El usuario respondió al permiso con:", permission);

        if (permission === 'granted') {
          console.log("PASO 4: Permiso concedido. Registrando sw.js...");
          
          navigator.serviceWorker.register('sw.js')
            .then(registration => {
              console.log("PASO 5: sw.js registrado. Esperando a que el worker esté activo...");
              return navigator.serviceWorker.ready;
            })
            .then(swListo => {
              console.log("PASO 6: Service Worker activo. Generando suscripción en el navegador...");
              
              // ¡PEGA TU LLAVE PÚBLICA AQUÍ!
              const llavePublicaVapid = 'BApc8sZjqEMNmgUAoZ8IRRt4v9cJItJCP2IEpoThoU1yqr9FK9Ian3i-GIW457WgWatp3Y_6SP37Fjwov2OPSog'; 
              const applicationServerKey = urlBase64ToUint8Array(llavePublicaVapid);
              
              return swListo.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: applicationServerKey
              });
            })
            .then(subscription => {
              console.log("PASO 7: ¡Suscripción creada con éxito!", subscription);
              console.log("PASO 8: Enviando datos a Node.js (http://localhost:3000)...");
              
              return fetch('http://localhost:3000/api/suscripciones', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(subscription)
              });
            })
            .then(res => {
              console.log("PASO 9: Respuesta recibida de Node.js. Código HTTP:", res.status);
            })
            .catch(err => {
              console.error("❌ ERROR DETECTADO EN LA CADENA:", err);
            });
            
        } else {
          console.warn("⚠️ El permiso no fue 'granted'. Proceso detenido.");
        }
      }).catch(err => console.error("❌ Error al pedir permiso:", err));
      
    } else {
      console.error("❌ El navegador no soporta notificaciones.");
    }
  });
</script>
</body>
</html>
