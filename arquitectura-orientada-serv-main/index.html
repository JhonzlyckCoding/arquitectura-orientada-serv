<!DOCTYPE html>
<html>
<head>
    <title>Dprisa</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="text-align: center;">

<header style="margin-bottom: 20px;">
    <h1>Dprisa</h1>
    <div id="usuarioActivo"></div>
</header>
<div class="car-animation-container">
    <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExa3VzczJ0MGkxNGpob3Q1N2syZWp2ejI5cnFvNnF5dHNnejZodGV1bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0K44KXsA64B641KU/giphy.gif" alt="Carro de prisa" class="animated-car">
</div>
<hr>

<!-- Menú público (antes de iniciar sesión) -->
<div id="menuPublico">
    <button onclick="location.href='registro.html'">Registrarse</button>
    <button onclick="location.href='login.html'">Acceder a cuenta</button>
</div>

<!-- Menú privado (después de iniciar sesión) -->
<div id="menuPrivado" style="display:none;">
    <button onclick="location.href='mapa.html'">Mapa</button>
    <button onclick="location.href='trafico.html'">Tráfico</button>
    <button onclick="location.href='rutas.html'">Rutas</button>
    <button onclick="location.href='reportes.html'">Reportes</button>
    <button onclick="location.href='registroreporte.html'">Reportar incidente</button>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<script>
function cargarIndex() {
  let usuario = JSON.parse(localStorage.getItem("usuarioActivo"));
  if (usuario) {
    document.getElementById("usuarioActivo").innerText = "Bienvenido, " + usuario.nombre;
    document.getElementById("menuPublico").style.display = "none";
    document.getElementById("menuPrivado").style.display = "block";
  } else {
    document.getElementById("usuarioActivo").innerText = "No has iniciado sesión.";
    document.getElementById("menuPublico").style.display = "block";
    document.getElementById("menuPrivado").style.display = "none";
  }
}

function cerrarSesion() {
  localStorage.removeItem("usuarioActivo");
  alert("Sesión cerrada");
  location.reload();
}

cargarIndex();
</script>

</body>
</html>
