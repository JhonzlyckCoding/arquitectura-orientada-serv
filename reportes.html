<!DOCTYPE html>
<html>
<head>
    <title>Dprisa - Reportes</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #f07979;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #d2a153;
        }
    </style>
</head>
<body>

<header style="text-align: center; margin-bottom: 20px;">
    <h1>Reportes</h1>
    <nav>
    <details>
      <summary><b>Menú</b></summary>
      <div>
        <a href="index.html"><button>Inicio</button></a>
        <a href="mapa.html"><button>Mapa</button></a>
        <a href="rutas.html"><button>Rutas</button></a>
        <a href="soporte.html"><button>Soporte</button></a>
        <a href="registroreporte.html"><button>Reportar incidente</button></a>
      </div>
    </details>
  </nav>
</header>

<section style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;">
    <label><b>Filtrar por tipo:</b></label>
    <select id="filtroTipo" onchange="mostrarReportes()" style="width: auto; max-width: 250px; margin: 0;">
        <option value="">Todos</option>
        <option value="Obras">Obras</option>
        <option value="Accidente">Accidente</option>
        <option value="Vehículo detenido">Vehículo detenido</option>
        <option value="Peligro en la vía">Peligro en la vía</option>
        <option value="Clima severo">Clima severo</option>
    </select>
</section>

<div id="contenedor-reportes" style="padding: 15px; margin-top: 20px; text-align: center;">
    <h2>Lista de Reportes Registrados</h2>
</div>

<hr>

<script>
async function mostrarReportes() {
  let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));

  // Obtener valor del filtro (Ya no buscamos 'filtroFecha' para evitar que se rompa el código)
  let filtroTipo = document.getElementById("filtroTipo").value;

  try {
    // Consultamos al backend en tiempo real
    const respuesta = await fetch('http://localhost:3000/api/reportes');
    const data = await respuesta.json();

    if (!data.success) {
      alert("No se pudo sincronizar el historial de reportes.");
      return;
    }

    let reportes = data.reportes;

    // Filtrado en memoria usando únicamente el tipo de incidente
    let filtrados = reportes.filter(r => {
      let coincideTipo = filtroTipo === "" || r.tipo === filtroTipo;
      return coincideTipo;
    });

    let contenedor = document.getElementById("contenedor-reportes");

    if (filtrados.length === 0) {
      contenedor.innerHTML = "<h2>Lista de Reportes Registrados</h2><p>No hay incidentes viales bajo este criterio de búsqueda.</p>";
      return;
    }

    // Construcción dinámica de la tabla HTML
    let html = `<table>
      <tr>
        <th>Tipo</th>
        <th>Descripción</th>
        <th>Fecha</th>
        <th>Usuario</th>
        <th>Acción</th> 
      </tr>`;
      
    filtrados.forEach((r) => {
      let fechaLimpia = r.fecha_incidente.split('T')[0];
      
      html += `<tr>
        <td>${r.tipo}</td>
        <td>${r.descripcion}</td>
        <td>${fechaLimpia}</td>
        <td>${r.usuario}</td>
        <td>
          <button class="btn-eliminar" onclick="eliminarUnReporte(${r.id_reporte})">🗑️ Borrar</button>
        </td>
      </tr>`;
    });
    html += "</table>";

    contenedor.innerHTML = "<h2>Lista de Reportes Registrados</h2>" + html;

  } catch (error) {
    console.error("Fallo de comunicación con la API de datos:", error);
  }
}

async function eliminarUnReporte(id) {
  if (!confirm("¿Estás seguro de que quieres eliminar este reporte?")) {
    return; 
  }

  try {
    const respuesta = await fetch(`http://localhost:3000/api/reportes/${id}`, {
      method: 'DELETE'
    });
    const resultado = await respuesta.json();

    if (resultado.success) {
      alert("Reporte eliminado con éxito.");
      mostrarReportes(); // Recarga la tabla en tiempo real
    } else {
      alert("No se pudo eliminar el reporte: " + resultado.message);
    }
  } catch (error) {
    console.error("Error al intentar eliminar el reporte:", error);
    alert("Error de conexión con el servidor.");
  }
}

// === ESTO HACE QUE CARGUEN AUTOMÁTICAMENTE AL ENTRAR ===
document.addEventListener("DOMContentLoaded", mostrarReportes);
</script>

</body>
</html>
