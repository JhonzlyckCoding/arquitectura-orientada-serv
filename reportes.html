<!DOCTYPE html>
<html>
<head>
    <title>Dprisa - Reportes</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>

<header style="text-align: center; margin-bottom: 20px;">
    <h1>Reportes</h1>
    <nav>
    <details>
      <summary><b>Menú</b></summary>
      <div>
        <a href="index.html"><button>Inicio</button></a>
        <a href="mapa.html"><button>Mapa</button></a>
        <a href="rutas.html"><button>Rutas</button></a>
        <a href="soporte.html"><button>Soporte</button></a>
        <a href="registroreporte.html"><button>Reportar incidente</button></a>
      </div>
    </details>
  </nav>
</header>

<!-- Filtros -->
<section style="text-align: center; margin-bottom: 20px;">
    <label>Filtrar por tipo:</label>
    <select id="filtroTipo" onchange="mostrarReportes()">
        <option value="">Todos</option>
        <option value="Obras">Obras</option>
        <option value="Accidente">Accidente</option>
        <option value="Vehículo detenido">Vehículo detenido</option>
        <option value="Peligro en la vía">Peligro en la vía</option>
        <option value="Clima severo">Clima severo</option>
    </select>

    <label>Filtrar por fecha:</label>
    <input type="date" id="filtroFecha" onchange="mostrarReportes()">

</section>

<div id="contenedor-reportes" style="padding: 15px; margin-top: 20px; text-align: center;">
    <h2>Lista de Reportes Registrados</h2>
</div>

<hr>

<section style="text-align: center;">
    <a href="registroreporte.html"><button>Reportar incidente</button></a>
    <button onclick="eliminarTodosMisReportes()">Eliminar todos mis reportes</button>
</section>

<script>
async function mostrarReportes() {
  let usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));

  // Obtener valores de los filtros
  let filtroTipo = document.getElementById("filtroTipo").value;
  let filtroFecha = document.getElementById("filtroFecha").value;

  try {
    // Consultamos al backend en tiempo real
    const respuesta = await fetch('http://localhost:3000/api/reportes');
    const data = await respuesta.json();

    if (!data.success) {
      alert("No se pudo sincronizar el historial de reportes.");
      return;
    }

    let reportes = data.reportes;

    // Filtrado en memoria del lado del cliente para mayor velocidad
    let filtrados = reportes.filter(r => {
      let coincideTipo = filtroTipo === "" || r.tipo === filtroTipo;
      
      // Limpiamos el formato de fecha ISO que retorna MySQL (YYYY-MM-DDTHH:mm:ss...)
      let fechaFormateada = r.fecha_incidente.split('T')[0];
      let coincideFecha = filtroFecha === "" || fechaFormateada === filtroFecha;
      
      return coincideTipo && coincideFecha;
    });

    let contenedor = document.getElementById("contenedor-reportes");

    if (filtrados.length === 0) {
      contenedor.innerHTML = "<h2>Lista de Reportes Registrados</h2><p>No hay incidentes viales bajo este criterio de búsqueda.</p>";
      return;
    }

    // Construcción dinámica de la tabla HTML
    let html = "<table><tr><th>Tipo</th><th>Descripción</th><th>Fecha</th><th>Usuario</th></tr>";
    filtrados.forEach((r) => {
      let fechaLimpia = r.fecha_incidente.split('T')[0];
      html += `<tr>
        <td>${r.tipo}</td>
        <td>${r.descripcion}</td>
        <td>${fechaLimpia}</td>
        <td>${r.usuario}</td>
      </tr>`;
    });
    html += "</table>";

    contenedor.innerHTML = "<h2>Lista de Reportes Registrados</h2>" + html;

  } catch (error) {
    console.error("Fallo de comunicación con la API de datos:", error);
  }
}
</script>

</body>
</html>
